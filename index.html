<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarKnow — 愛犬との暮らしを、整える。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#008661; --green-light:#d4ede6; --green-sage:#ddeee8;
  --green-pale:#eef7f3; --green-mid:#006b4e;
  --off-white:#f7f5f1; --warm-white:#fdfcfa;
  --text:#1c1c1a; --text-mid:#4a4a45; --text-light:#909088;
  --border:#e6e2dc;
  --display:'Josefin Sans',sans-serif;
  --sans:'Noto Sans JP',system-ui,sans-serif;
  --ease:0.5s cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:#fff;color:var(--text);line-height:1.85;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:var(--sans);font-weight:300;letter-spacing:0.05em;}
.section-label{font-family:var(--display);font-size:0.6rem;font-weight:400;letter-spacing:0.32em;text-transform:uppercase;color:var(--green);display:block;margin-bottom:1.4rem;}
.section-divider{width:36px;height:1px;background:var(--green);margin-bottom:2.2rem;}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3.5rem;height:70px;background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid transparent;transition:border-color .4s ease,box-shadow .4s ease;}
header.scrolled{border-color:var(--border);box-shadow:0 1px 24px rgba(0,0,0,0.04);}
.logo-img{height:40px;width:auto;display:block;}
nav{display:flex;align-items:center;gap:2.4rem;}
nav a{font-family:var(--display);font-size:0.7rem;font-weight:400;letter-spacing:0.14em;color:var(--text-mid);text-decoration:none;transition:color .3s ease;position:relative;}
nav a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--green);transition:width .4s ease;}
nav a:hover{color:var(--text);}
nav a:hover::after{width:100%;}

/* CTA Button Styles */
.header-cta{font-family:var(--sans)!important;background:var(--green)!important;color:#fff!important;padding:.52rem 1.3rem!important;border-radius:2px;font-size:.72rem!important;letter-spacing:.08em!important;font-weight:400!important;white-space:nowrap;text-decoration:none;transition:background .3s ease,transform .3s ease!important;display:inline-block;}
.header-cta::after{display:none!important;}
.header-cta:hover{background:var(--green-mid)!important;transform:translateY(-1px);}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:1px;background:var(--text);}
.mobile-nav{display:none;position:fixed;top:70px;left:0;right:0;background:#fff;padding:2rem 2rem 2.5rem;border-bottom:1px solid var(--border);z-index:99;flex-direction:column;gap:1.4rem;}
.mobile-nav.open{display:flex;}
.mobile-nav a{font-family:var(--display);font-size:.9rem;letter-spacing:.12em;color:var(--text-mid);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1.2rem;}
.mobile-nav a:last-child{border:none;padding-bottom:0;color:var(--green);font-weight:600;}

/* LAYOUT */
section{padding:9rem 0;}
.container{max-width:1180px;margin:0 auto;padding:0 3.5rem;}

/* HERO (一部抜粋) */
#hero{min-height:100vh;position:relative;overflow:hidden;padding:0;background:var(--warm-white);display:flex;align-items:center;}
.hero-inner{position:relative;z-index:2;width:100%;max-width:1180px;margin:0 auto;padding:0 3.5rem;padding-top:70px;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;min-height:100vh;}
.hero-headline{font-size:clamp(2.4rem,4vw,3.7rem);font-weight:300;line-height:1.5;letter-spacing:.05em;margin-bottom:2rem;}
.hero-ctas{display:flex;gap:1rem;flex-wrap:wrap;}

/* BUTTONS */
.btn-primary{background:var(--green);color:#fff;padding:.95rem 1.9rem;border-radius:2px;font-family:var(--sans);font-size:.76rem;letter-spacing:.1em;text-decoration:none;font-weight:400;display:inline-block;transition:background .4s ease,transform .4s ease,box-shadow .4s ease;position:relative;overflow:hidden;}
.btn-primary:hover{background:var(--green-mid);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,134,97,.22);}
.btn-secondary{background:transparent;color:var(--text);padding:.95rem 1.9rem;border-radius:2px;border:1px solid #ccc;font-family:var(--sans);font-size:.76rem;letter-spacing:.1em;text-decoration:none;font-weight:400;display:inline-block;transition:border-color .3s ease,transform .3s ease;}

/* --- RESPONSIVE --- */
@media(max-width:980px){
  header{padding:0 1.6rem;}
  nav{display:none;}
  .hamburger{display:flex;}
  .hero-inner{grid-template-columns:1fr;padding:0 1.6rem;padding-top:110px;padding-bottom:5rem;}
  .mobile-nav.open{display:flex;}
}

@media(max-width:480px){
  .hero-ctas{flex-direction:column; width: 100%;}
  .btn-primary, .btn-secondary{
    text-align:center;
    width: 100%;
    padding: 1.1rem; /* スマホで押しやすく少し大きく */
    display: block;
  }
}
</style>
</head>
<body>

<header id="main-header">
  <a href="/"><img class="logo-img" src="YOUR_LOGO_PATH" alt="BarKnow"></a>
  <nav>
    <a href="#about">About</a>
    <a href="#vision">Vision</a>
    <a href="#services">Services</a>
    <a href="/lp/" class="header-cta">App</a>
  </nav>
  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="mobile-nav" id="mobile-nav">
  <a href="#about">About</a>
  <a href="#vision">Vision</a>
  <a href="#services">Services</a>
  <a href="/lp/">App</a>
</div>

<section id="hero">
  <div class="hero-inner">
    <div class="hero-content">
      <h1 class="hero-headline">愛犬との暮らしを、<br><span class="accent">整える。</span></h1>
      <p class="hero-sub">BarKnowは、犬
