<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarKnow — 愛犬との暮らしを、整える。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#008661; --green-light:#d4ede6; --green-sage:#ddeee8;
  --green-pale:#eef7f3; --green-mid:#006b4e;
  --off-white:#f7f5f1; --warm-white:#fdfcfa;
  --text:#1c1c1a; --text-mid:#4a4a45; --text-light:#909088;
  --border:#e6e2dc;
  --display:'Josefin Sans',sans-serif;
  --sans:'Noto Sans JP',system-ui,sans-serif;
  --ease:0.5s cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:#fff;color:var(--text);line-height:1.85;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:var(--sans);font-weight:300;letter-spacing:0.05em;}

/* --- HEADER 修正部分 --- */
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3.5rem;height:70px;background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid transparent;transition:border-color .4s ease,box-shadow .4s ease;}
header.scrolled{border-color:var(--border);box-shadow:0 1px 24px rgba(0,0,0,0.04);}
.logo-img{height:40px;width:auto;display:block;}
nav{display:flex;align-items:center;gap:2.4rem;}
nav a{font-family:var(--display);font-size:0.7rem;font-weight:400;letter-spacing:0.14em;color:var(--text-mid);text-decoration:none;transition:color .3s ease;position:relative;}
nav a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--green);transition:width .4s ease;}
nav a:hover{color:var(--text);}
nav a:hover::after{width:100%;}

/* Appボタンのスタイル */
.header-cta{
  font-family: var(--display) !important;
  background: var(--green) !important;
  color: #fff !important;
  padding: 0.6rem 1.5rem !important;
  border-radius: 4px;
  font-size: 0.75rem !important;
  letter-spacing: 0.15em !important;
  font-weight: 600 !important;
  text-decoration: none;
  transition: all 0.3s ease !important;
  display: inline-block;
}
.header-cta:hover{
  background: var(--green-mid) !important;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,134,97,0.2);
}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:1px;background:var(--text);}
.mobile-nav{display:none;position:fixed;top:70px;left:0;right:0;background:#fff;padding:2rem 2rem 2.5rem;border-bottom:1px solid var(--border);z-index:99;flex-direction:column;gap:1.4rem;}
.mobile-nav.open{display:flex;}
.mobile-nav a{font-family:var(--display);font-size:.9rem;letter-spacing:.12em;color:var(--text-mid);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1.2rem;}
.mobile-nav a.mobile-cta{color:var(--green);font-weight:600;border:none;}

/* --- 以下、元のスタイルを継続 --- */
section{padding:9rem 0;}
.container{max-width:1180px;margin:0 auto;padding:0 3.5rem;}
.hero-inner{position:relative;z-index:2;width:100%;max-width:1180px;margin:0 auto;padding:0 3.5rem;padding-top:70px;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;min-height:100vh;}
/* (スタイルの詳細は中略していますが、元のコードをそのまま保持してください) */
</style>
</head>
<body>

<header id="main-header">
  <a href="/"><img class="logo-img" src="data:image/png;base64,...(元のロゴデータ)" alt="BarKnow"></a>
  
  <nav>
    <a href="#about">ABOUT</a>
    <a href="#vision">VISION</a>
    <a href="#services">SERVICES</a>
    <a href="#contact">CONTACT</a>
    <a href="/lp" class="header-cta">APP</a>
  </nav>

  <button class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<div class="mobile-nav" id="mobile-nav">
  <a href="#about">ABOUT</a>
  <a href="#vision">VISION</a>
  <a href="#services">SERVICES</a>
  <a href="#contact">CONTACT</a>
  <a href="/lp" class="mobile-cta">APP</a>
</div>

<script>
// ヘッダースクロール制御
const header = document.getElementById('main-header');
window.addEventListener('scroll', () => {
  if (window.scrollY > 50) {
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
});

// ハンバーガーメニュー制御
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobile-nav');
hamburger.addEventListener('click', () => {
  mobileNav.classList.toggle('open');
});

// メニュークリック時に閉じる
const mobileLinks = mobileNav.querySelectorAll('a');
mobileLinks.forEach(link => {
  link.addEventListener('click', () => {
    mobileNav.classList.remove('open');
  });
});
</script>
</body>
</html>
